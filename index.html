<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renewal — Daily Tracking</title>
<link rel="apple-touch-icon" href="icons/icon-harvest-180.png">
<meta name="theme-color" content="#EDEFE9">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EDEFE9;
    --ink:#22302B;
    --ink-soft:#56655D;
    --line:#D7D3C2;
    --gold:#BD7F2E;
    --gold-soft:#E8D2AC;
    --teal:#4F6F76;
    --teal-soft:#C9DBDC;
    --card:#F8F8F2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;min-height:100vh;
    background:var(--paper);
    background-image:radial-gradient(circle at 15% 0%, #E7E4D5 0%, transparent 45%), radial-gradient(circle at 90% 100%, #E2E6DF 0%, transparent 45%);
    color:var(--ink);font-family:'Inter',sans-serif;
    display:flex;align-items:center;justify-content:center;padding:32px 18px;
  }
  .wrap{max-width:560px;width:100%;}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft);text-align:center;margin-bottom:10px;}
  h1{font-family:'Fraunces',serif;font-weight:600;font-size:38px;text-align:center;margin:0 0 8px;letter-spacing:-0.5px;}
  .sub{text-align:center;color:var(--ink-soft);font-size:14px;margin-bottom:36px;line-height:1.5;}
  .cards{display:flex;flex-direction:column;gap:16px;}
  .app-card{
    display:flex;align-items:center;gap:16px;
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:22px;text-decoration:none;color:var(--ink);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .app-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(34,48,43,0.08);}
  .badge{
    width:52px;height:52px;border-radius:14px;flex:none;
    display:flex;align-items:center;justify-content:center;font-size:24px;
  }
  .badge.nutrition{background:var(--gold-soft);}
  .badge.fitness{background:var(--teal-soft);}
  .app-card .title{font-family:'Fraunces',serif;font-weight:600;font-size:19px;margin-bottom:3px;}
  .app-card .desc{font-size:12.5px;color:var(--ink-soft);line-height:1.4;}
  .app-card .arrow{margin-left:auto;font-size:18px;color:var(--ink-soft);flex:none;}
  footer{text-align:center;font-size:11px;color:var(--ink-soft);margin-top:32px;font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">Daily tracking</div>
  <h1>Renewal</h1>
  <div class="sub">Two places to check in each day — what you're fueling with, and how you're moving.</div>
  <div class="cards">
    <a class="app-card" href="nutrition-tracker.html">
      <div class="badge nutrition">🌿</div>
      <div>
        <div class="title">Harvest Log</div>
        <div class="desc">Calories, protein, water, vitamins &amp; weight journey</div>
      </div>
      <div class="arrow">→</div>
    </a>
    <a class="app-card" href="fitness-tracker.html">
      <div class="badge fitness">🥾</div>
      <div>
        <div class="title">Trailhead</div>
        <div class="desc">Walks, LazyFit core, and your strength plan</div>
      </div>
      <div class="arrow">→</div>
    </a>
  </div>
  <footer>built for the long road back to full strength</footer>
</div>
</body>
</html>
